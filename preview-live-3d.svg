<svg width="1600" height="1100" viewBox="0 0 1600 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="1020" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4E8D6"/>
      <stop offset="1" stop-color="#E7D5BB"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF9F1"/>
      <stop offset="1" stop-color="#F7EBDC"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#5D8FE8"/>
      <stop offset="1" stop-color="#3569C6"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F1E1C3"/>
      <stop offset="1" stop-color="#D9C099"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#8E6C3A" flood-opacity="0.18"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
    <pattern id="gridMinor" width="26" height="26" patternUnits="userSpaceOnUse">
      <path d="M26 0H0V26" stroke="#B69260" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <pattern id="gridMajor" width="130" height="130" patternUnits="userSpaceOnUse">
      <rect width="130" height="130" fill="url(#gridMinor)"/>
      <path d="M130 0H0V130" stroke="#9D7644" stroke-opacity="0.18" stroke-width="1.4"/>
    </pattern>
    <style>
      .title { font: 700 58px Aptos, Segoe UI, sans-serif; fill: #24180f; }
      .subtitle { font: 400 24px Aptos, Segoe UI, sans-serif; fill: #6B553D; }
      .sectionLabel { font: 700 20px Consolas, monospace; fill: white; text-anchor: middle; }
      .sectionMeta { font: 700 16px Consolas, monospace; fill: rgba(255,255,255,0.92); text-anchor: middle; }
      .panelTitle { font: 700 28px Aptos, Segoe UI, sans-serif; fill: #1D140D; }
      .panelBody { font: 400 19px Aptos, Segoe UI, sans-serif; fill: #6B553D; }
      .caption { font: 700 20px Aptos, Segoe UI, sans-serif; fill: #1F5F74; }
      .small { font: 400 17px Aptos, Segoe UI, sans-serif; fill: #6B553D; }
    </style>
  </defs>

  <rect width="1600" height="1100" rx="32" fill="url(#bg)"/>

  <text x="90" y="105" class="title">Simple Live 3D Preview Concept</text>
  <text x="90" y="145" class="subtitle">2D layout stays the main editor. A simplified synchronized 3D scene sits directly underneath and updates while sections move.</text>


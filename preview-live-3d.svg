    <rect x="105" y="300" width="1390" height="225" rx="14" fill="url(#gridMajor)"/>

    <rect x="120" y="315" width="58" height="70" rx="10" fill="url(#blue)" stroke="#325A9B" stroke-width="2.5"/>
    <rect x="179" y="315" width="26" height="195" rx="10" fill="url(#blue)" stroke="#325A9B" stroke-width="2.5"/>
